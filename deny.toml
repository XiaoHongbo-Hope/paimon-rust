[advisories]
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "No fixed version; reqsign uses RSA only for outbound cloud request signing." },
    { id = "RUSTSEC-2026-0176", reason = "The affected PyList and PyTuple iterator APIs are unused." },
    { id = "RUSTSEC-2026-0177", reason = "PyCFunction::new_closure is unused." },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "MIT",
    "Unicode-3.0",
    "Zlib",
    "bzip2-1.0.6",
]

exceptions = [
    # open data licenses that SHOULD be OK
    { crate = "webpki-root-certs", allow = [
        "CDLA-Permissive-2.0",
    ] },
]
